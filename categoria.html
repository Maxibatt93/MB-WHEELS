<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Categoría | MB Wheels</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #111;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}

a { text-decoration: none; color: inherit; }

header {
  background: #000;
  padding: 30px;
  text-align: center;
}

header h1 {
  margin: 0;
  color: #7bc043;
  font-size: 36px;
}

header p {
  color: #ccc;
  margin-top: 8px;
}

.catalogo {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

/* Card producto */
.item {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  text-align: center;
  transition: transform .3s, box-shadow .3s;
}

.item:hover {
  transform: translateY(-8px);
  box-shadow: 0 18px 35px rgba(0,0,0,.6);
}

.item img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.item h3 {
  color: #7bc043;
  margin: 15px 0 5px;
}

.item p {
  color: #ccc;
  font-size: 14px;
  margin-bottom: 15px;
}

.volver {
  display: inline-block;
  margin: 40px auto;
  padding: 10px 20px;
  border: 2px solid #7bc043;
  border-radius: 8px;
  color: #7bc043;
}
.volver:hover {
  background: #7bc043;
  color: #000;
}
</style>
</head>

<body>

<header>
  <h1>CASCOS</h1>
  <p>Modelos disponibles</p>
</header>

  producto.html

  </a>

</section>

</body>
</html>
