<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MB Wheels</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      height: 520px;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200px;
      background: linear-gradient(
        to top,
        rgba(0,0,0,.85),
        rgba(0,0,0,.5),
        rgba(0,0,0,0)
      );
      z-index: 1;
    }

    .logo {
      position: absolute;
      bottom: 60px;
      width: 100%;
      text-align: center;
      z-index: 2;
    }

    .logo h1 {
      margin: 0;
      font-size: 48px;
      color: #7bc043;
      letter-spacing: 2px;
    }

    .logo p {
      margin-top: 8px;
      font-size: 16px;
    }

    /* ===== PRODUCTOS ===== */
    .productos {
      padding: 60px 40px;
      max-width: 1100px;
      margin: auto;
    }

    .productos h2 {
      text-align: center;
      color: #7bc043;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .item {
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
    }

    .item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .item h3 {
      margin: 15px 0 8px;
      color: #7bc043;
    }

    .item p {
      margin-bottom: 15px;
      color: #ccc;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <img src="img/banner.jpg" alt="MB Wheels Banner">

    <div class="overlay"></div>

    <div class="logo">
      <h1>MB WHEELS</h1>
      <p>Bicis y Motos · Indumentaria nueva y usada</p>
    </div>
  </section>

  <!-- PRODUCTOS -->
  <section class="productos">
    <h2>Productos destacados</h2>

    <div class="grid">
      <div class="item">
        <img src="img/casco.jpg" alt="Casco">
        <h3>Cascos</h3>
        <p>Nuevos y usados</p>
      </div>

      <div class="item">
        <img src="img/mtb.jpg" alt="Bicicleta">
        <h3>Bicicletas</h3>
        <p>Mountain y urbanas</p>
      </div>

      <div class="item">
        <img src="img/campera.jpg" alt="Indumentaria">
        <h3>Indumentaria</h3>
        <p>Camperas y equipamiento</p>
      </div>
    </div>
  </section>

</body>
</html>
